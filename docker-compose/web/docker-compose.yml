x-backend-env: &backend-env
  PATH: /app/.venv/bin:/usr/local/bin:/usr/bin:/bin
  ISTAROTH_DOCUMENT_STORE_SET: CHS:/data/checkpoints/chs
  ISTAROTH_DATABASE_URI: sqlite+aiosqlite:////data/state/web.sqlite
  ISTAROTH_TRAINING_DEVICE: cpu
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
  PYTHONDONTWRITEBYTECODE: "1"

x-backend-common: &backend-common
  image: python:3.14-slim
  working_dir: /app
  volumes:
    - ./checkpoints:/data/checkpoints
    - dev-data:/data/state
    - ../../istaroth:/app/istaroth:ro
    - ../../scripts:/app/scripts:ro
    - ../../migrations:/app/migrations:ro
    - ../../alembic.ini:/app/alembic.ini:ro
    - backend-venv:/app/.venv
    - uv-cache:/root/.cache/uv:ro
    - hf-cache:/root/.cache/huggingface
  env_file:
    - ../../.env.common
    - ../../.env.web
  environment: *backend-env

services:
  backend-deps:
    <<: *backend-common
    image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
    command: ["uv", "sync", "--frozen", "--no-group", "dev", "--group", "ml"]
    environment:
      UV_LINK_MODE: symlink
    volumes:
      - ../../pyproject.toml:/app/pyproject.toml:ro
      - ../../uv.lock:/app/uv.lock:ro
      - backend-venv:/app/.venv
      - uv-cache:/root/.cache/uv

  db-migrate:
    <<: *backend-common
    command: ["alembic", "upgrade", "head"]
    depends_on:
      backend-deps:
        condition: service_completed_successfully

  retrieval:
    <<: *backend-common
    command: ["python", "-m", "istaroth.services.retrieval", "--reload"]
    depends_on:
      backend-deps:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
    ports:
      - "${CONDUCTOR_RETRIEVAL_METRICS_HOST_PORT:-8092}:8092"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/docs')"]
      # Probe every 1s while starting up (fast readiness detection), but relax to
      # 30s once healthy so the per-second python launch + log line don't run forever.
      start_interval: 1s
      interval: 30s
      timeout: 5s
      start_period: 3600s
      retries: 3

  istaroth:
    <<: *backend-common
    command: ["python", "-m", "istaroth.services.backend", "--reload"]
    depends_on:
      backend-deps:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
      # The backend only calls retrieval lazily per-request (from_retrieval_service
      # just builds httpx clients at startup, no network call), so it doesn't need to
      # wait for retrieval's slow ML-model load to finish. service_started lets the
      # backend come up in parallel with retrieval instead of serializing behind it.
      retrieval:
        condition: service_started
      jaeger:
        condition: service_started
    ports:
      - "${CONDUCTOR_BACKEND_METRICS_HOST_PORT:-8090}:8090"
    environment:
      <<: *backend-env
      ISTAROTH_RETRIEVAL_SERVICE_URL: http://retrieval:8002

  frontend:
    # Keep in sync with frontend/.nvmrc
    image: node:18-alpine
    working_dir: /app
    command: ["sh", "-c", "npm run dev -- --host 0.0.0.0 --port ${CONDUCTOR_PORT:-5173}"]
    depends_on:
      frontend-deps:
        condition: service_completed_successfully
      # The Vite dev server only proxies to the backend lazily per-request
      # (VITE_API_PROXY_TARGET), so it doesn't need istaroth up to boot. Gating only
      # on frontend-deps lets the UI come up in parallel with the whole backend chain.
    ports:
      - "${CONDUCTOR_PORT:-5173}:${CONDUCTOR_PORT:-5173}"
    volumes:
      - ../../frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_PROXY_TARGET=http://istaroth:8000
      - VITE_PUBLIC_HOST=${VITE_PUBLIC_HOST:-}

  frontend-deps:
    # Keep in sync with frontend/.nvmrc
    image: node:18-alpine
    working_dir: /app
    command: ["npm", "ci"]
    volumes:
      - ../../frontend:/app
      - frontend-node-modules:/app/node_modules
      - npm-cache:/root/.npm

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.15.0
    ports:
      - "${CONDUCTOR_JAEGER_UI_HOST_PORT:-16686}:16686"  # Jaeger UI
      - "${CONDUCTOR_JAEGER_OTLP_HOST_PORT:-4317}:4317"  # OTLP gRPC receiver

volumes:
  backend-venv:
  frontend-node-modules:
  dev-data:
  uv-cache:
    external: true
    name: uv-cache
  hf-cache:
    external: true
    name: hf-cache
  npm-cache:
    external: true
    name: npm-cache
