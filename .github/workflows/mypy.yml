name: Type Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - run: uv python install 3.12
    - run: uv sync
    - run: uv run mypy
