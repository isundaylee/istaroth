name: Type Check

on:
  push:
    branches: [ main ]
    paths:
      - 'istaroth/**'
      - 'scripts/**'
      - 'tests/**'
      - 'migrations/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/mypy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'istaroth/**'
      - 'scripts/**'
      - 'tests/**'
      - 'migrations/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/mypy.yml'

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - run: uv python install 3.12
    - run: uv sync
    - name: Cache mypy results
      uses: actions/cache@v4
      with:
        path: .mypy_cache
        key: mypy-${{ runner.os }}-${{ hashFiles('uv.lock') }}-${{ github.sha }}
        restore-keys: |
          mypy-${{ runner.os }}-${{ hashFiles('uv.lock') }}-
          mypy-${{ runner.os }}-
    - run: uv run mypy
