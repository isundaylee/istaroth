name: Type Check

on:
  push:
    branches: [ main ]
    paths:
      - 'istaroth/**'
      - 'scripts/**'
      - 'tests/**'
      - 'migrations/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/mypy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'istaroth/**'
      - 'scripts/**'
      - 'tests/**'
      - 'migrations/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/mypy.yml'

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - run: uv python install 3.12
    - run: uv sync
    - run: uv run mypy
