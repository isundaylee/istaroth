name: Run Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'istaroth/**'
      - 'scripts/**'
      - 'tests/**'
      - 'migrations/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'istaroth/**'
      - 'scripts/**'
      - 'tests/**'
      - 'migrations/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    - run: uv sync
    - run: uv run pytest -v
