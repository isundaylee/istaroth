repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        # Contract fixtures are byte-exact serializer output (no trailing
        # newline); see tests/test_schema_contract.py.
        exclude: ^tests/fixtures/rust_agd_regen_contract/
      - id: check-yaml
        exclude: ^helm/.*\.yaml$
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-case-conflict

  - repo: local
    hooks:
      - id: forbid-nocommit
        name: Forbid NOCOMMIT
        description: Reject commits that contain NOCOMMIT
        entry: 'NOCOMMIT'
        language: pygrep
        types: [text]
        exclude: ^\.pre-commit-config\.yaml$

  - repo: local
    hooks:
      - id: no-hardcoded-colors-frontend
        name: No hardcoded colors in frontend
        description: Use CSS variables instead of hardcoded hex color values in frontend source
        entry: '''#[0-9a-fA-F]{3,6}[^0-9a-fA-F]'''
        language: pygrep
        files: ^frontend/src/.*\.(tsx|ts)$
        exclude: ^frontend/src/types/api-generated\.ts$

  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx eslint src/'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: tsc-frontend
        name: tsc (frontend)
        entry: bash -c 'cd frontend && npx tsc'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: stylelint-frontend
        name: stylelint (frontend)
        entry: bash -c 'cd frontend && npx stylelint "src/**/*.css"'
        language: system
        files: ^frontend/src/.*\.css$
        pass_filenames: false

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (rust)
        entry: bash -c 'PATH="$HOME/.cargo/bin:$PATH" cargo fmt --manifest-path rust/Cargo.toml --all'
        language: system
        files: ^rust/.*\.rs$
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy (rust)
        entry: bash -c 'PATH="$HOME/.cargo/bin:$PATH" cargo clippy --manifest-path rust/Cargo.toml --workspace --all-targets -- -D warnings'
        language: system
        files: ^rust/.*(\.rs|Cargo\.(toml|lock))$
        pass_filenames: false
